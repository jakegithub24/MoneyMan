<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>MoneyMan - Unlock App</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        // Inline theme initialization to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.add('light');
        }
        
        // Inline accessibility initialization
        const savedAcc = localStorage.getItem('accessibility') || 'false';
        if (savedAcc === 'true') {
            document.documentElement.classList.add('accessibility-mode');
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* High Contrast & Large Text Accessible Mode styles */
        html.accessibility-mode {
            font-size: 120% !important;
        }
        .accessibility-mode body {
            font-weight: 550 !important;
        }
        
        .dark body {
            background-color: #121212;
            color: #f0f1f1;
        }
        
        .dark .bg-surface-light {
            background-color: #1E1E1E !important;
        }
        
        /* Custom PIN Dots styles */
        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #0d631b;
            transition: all 0.15s ease-in-out;
        }
        .dark .pin-dot {
            border-color: #a3f69c;
        }
        .pin-dot.filled {
            background-color: #0d631b;
            transform: scale(1.25);
            box-shadow: 0 0 8px rgba(13, 99, 27, 0.4);
        }
        .dark .pin-dot.filled {
            background-color: #a3f69c;
            box-shadow: 0 0 8px rgba(163, 246, 156, 0.4);
        }

        /* Lockscreen Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
            20%, 40%, 60%, 80% { transform: translateX(6px); }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .animate-shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
    </style>
</head>
<body class="bg-white dark:bg-[#1E1E1E] sm:bg-slate-50 sm:dark:bg-[#121212] text-slate-800 dark:text-[#f0f1f1] min-h-screen flex flex-col justify-between p-0 sm:p-6">
    
    <!-- Top Spacer / App branding -->
    <header class="flex justify-center pt-8 sm:pt-8 animate-fade-in-up">
        <div class="flex items-center gap-2 text-primary dark:text-[#a3f69c] transition-transform hover:scale-105 duration-300">
            <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
            <span class="font-bold text-2xl tracking-tight">MoneyMan</span>
        </div>
    </header>

    <!-- Center Card -->
    <main class="max-w-md w-full mx-auto bg-transparent sm:bg-white sm:dark:bg-[#1E1E1E] p-4 sm:p-8 rounded-none sm:rounded-3xl border-none sm:border sm:border-slate-200/50 dark:sm:border-zinc-800/60 shadow-none sm:shadow-xl space-y-6 text-center animate-fade-in-up" style="animation-delay: 100ms;">
        <div class="space-y-2">
            <h2 class="text-xl font-bold text-slate-900 dark:text-white">Welcome Back, {{ username }}</h2>
            <p class="text-sm text-slate-500 dark:text-zinc-400">Enter your 4-digit PIN to unlock secure details</p>
        </div>

        <!-- PIN Status Dots -->
        <div class="flex justify-center gap-4 py-4 {% if error %} animate-shake {% endif %}">
            <div class="pin-dot" id="dot1"></div>
            <div class="pin-dot" id="dot2"></div>
            <div class="pin-dot" id="dot3"></div>
            <div class="pin-dot" id="dot4"></div>
        </div>

        {% if error %}
        <div class="p-3 text-xs bg-red-50 dark:bg-red-950/20 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-900/30 rounded-xl animate-fade-in-up">
            {{ error }}
        </div>
        {% endif %}

        <!-- Hidden input form -->
        <form action="{{ url_for('login') }}" method="POST" id="pinForm">
            <input type="hidden" name="pin" id="pinInput"/>
        </form>

        <!-- Custom Touch Numeric Keypad -->
        <div class="grid grid-cols-3 gap-3 max-w-[280px] mx-auto pt-2">
            {% for i in range(1, 10) %}
            <button onclick="pressKey('{{ i }}')" class="h-14 rounded-2xl bg-slate-100/80 dark:bg-zinc-800/40 hover:bg-slate-200 dark:hover:bg-zinc-700/40 active:scale-95 transition-all text-lg font-bold text-slate-800 dark:text-zinc-200 flex items-center justify-center">
                {{ i }}
            </button>
            {% endfor %}
            
            <!-- Clear Button -->
            <button onclick="clearPin()" class="h-14 rounded-2xl flex items-center justify-center text-slate-500 hover:text-slate-800 dark:text-zinc-400 dark:hover:text-white active:scale-95 transition-all">
                <span class="material-symbols-outlined">backspace</span>
            </button>

            <!-- 0 Key -->
            <button onclick="pressKey('0')" class="h-14 rounded-2xl bg-slate-100/80 dark:bg-zinc-800/40 hover:bg-slate-200 dark:hover:bg-zinc-700/40 active:scale-95 transition-all text-lg font-bold text-slate-800 dark:text-zinc-200 flex items-center justify-center">
                0
            </button>

            <!-- Unlock / Submit placeholder -->
            <div class="h-14 flex items-center justify-center"></div>
        </div>
    </main>

    <!-- Bottom Footer -->
    <footer class="text-center text-xs text-slate-400 dark:text-zinc-500 pb-4">
        🔒 SQLite Encrypted & Local-Only Model
    </footer>

    <!-- Keypad JS Logic -->
    <script>
        let pin = "";
        const pinInput = document.getElementById("pinInput");
        const pinForm = document.getElementById("pinForm");
        const dots = [
            document.getElementById("dot1"),
            document.getElementById("dot2"),
            document.getElementById("dot3"),
            document.getElementById("dot4")
        ];

        function updateDots() {
            dots.forEach((dot, idx) => {
                if (idx < pin.length) {
                    dot.classList.add("filled");
                } else {
                    dot.classList.remove("filled");
                }
            });
        }

        function pressKey(key) {
            if (pin.length < 4) {
                pin += key;
                updateDots();
                if (pin.length === 4) {
                    pinInput.value = pin;
                    setTimeout(() => {
                        pinForm.submit();
                    }, 150);
                }
            }
        }

        function clearPin() {
            if (pin.length > 0) {
                pin = pin.slice(0, -1);
                updateDots();
            }
        }

        // Allow keyboard input as well
        document.addEventListener("keydown", (e) => {
            if (e.key >= "0" && e.key <= "9") {
                pressKey(e.key);
            } else if (e.key === "Backspace") {
                clearPin();
            }
        });
    </script>
</body>
</html>
